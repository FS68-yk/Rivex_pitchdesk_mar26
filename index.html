<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>RIVEX Investor Access</title>
  <style>
    :root {
      --bg: #061015;
      --panel: rgba(10, 16, 21, 0.82);
      --border: rgba(255,255,255,0.08);
      --ink: #f4fbfc;
      --muted: rgba(244,251,252,0.62);
      --accent: #00b8cc;
      --accent-2: #5fe0b7;
      --danger: #ff6f7d;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0,184,204,0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(95,224,183,0.10), transparent 22%),
        linear-gradient(180deg, #040608 0%, #091116 100%);
      color: var(--ink);
      font-family: var(--font-sans);
      padding: 24px;
    }
    .shell {
      min-height: calc(100vh - 48px);
      display: grid;
      place-items: center;
    }
    .card {
      width: min(460px, 100%);
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.28);
      padding: 28px;
      display: grid;
      gap: 18px;
    }
    .eyebrow {
      color: var(--accent);
      font: 800 11px var(--font-mono);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    h1 {
      font-size: clamp(30px, 6vw, 40px);
      line-height: 1;
      letter-spacing: -1.2px;
      font-weight: 800;
    }
    .sub {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .field {
      display: grid;
      gap: 8px;
    }
    label {
      color: rgba(244,251,252,0.82);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: var(--ink);
      padding: 14px 15px;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: rgba(0,184,204,0.55);
      box-shadow: 0 0 0 3px rgba(0,184,204,0.12);
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button, .ghost {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button {
      background: linear-gradient(135deg, #14cadf, #009daf);
      color: #041012;
      min-width: 160px;
    }
    .ghost {
      color: var(--ink);
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
    }
    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }
    .status.error { color: var(--danger); }
    .status.success { color: var(--accent-2); }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      padding-top: 6px;
    }
    .footer a { color: var(--ink); text-decoration: none; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="eyebrow">Private Investor Access</div>
      <h1>RIVEX Investor Access</h1>
      <p class="sub">Enter your email and invitation code to access the protected deck. Admin access remains available separately.</p>

      <form id="access-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@fund.com" required />
        </div>
        <div class="field" style="margin-top:14px;">
          <label for="inviteCode">Invitation Code</label>
          <input id="inviteCode" name="inviteCode" type="text" autocomplete="one-time-code" placeholder="Enter invite code" required />
        </div>
        <div class="actions" style="margin-top:18px;">
          <button id="submit-btn" type="submit">Enter Deck</button>
          <a class="ghost" href="/admin">Admin</a>
          <a class="ghost" href="/deck">Open Deck</a>
        </div>
        <div id="status" class="status" style="margin-top:14px;"></div>
      </form>

      <div class="footer">
        <span>RIVEX Group Limited</span>
        <a href="/logout">Clear session</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('access-form');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusEl.className = 'status';
      statusEl.textContent = 'Checking access…';
      submitBtn.disabled = true;

      const payload = {
        email: document.getElementById('email').value,
        inviteCode: document.getElementById('inviteCode').value,
      };

      try {
        const response = await fetch('/.netlify/functions/access', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          statusEl.className = 'status error';
          statusEl.textContent = data.error || 'Access failed.';
          submitBtn.disabled = false;
          return;
        }
        statusEl.className = 'status success';
        statusEl.textContent = 'Access granted. Redirecting…';
        window.location.href = data.redirect || '/deck';
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Unable to validate access right now.';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
